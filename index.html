<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NΞURAL — AI Chat</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #070709;
  --surface:  #0e0e12;
  --card:     #121218;
  --border:   #1c1c28;
  --border2:  #252535;
  --accent:   #00e5ff;
  --accent2:  #bf5af2;
  --green:    #39ff14;
  --text:     #dcdcf0;
  --muted:    #4a4a6a;
  --muted2:   #6a6a8a;
  --user-bg:  #0d1a2a;
  --bot-bg:   #0e0e14;
  --danger:   #ff453a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 999;
}

/* Grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  padding: 0 20px;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,7,9,0.95);
  backdrop-filter: blur(12px);
  gap: 16px;
  flex-shrink: 0;
}

.logo {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(0,229,255,0.4);
}

.logo span { color: var(--muted2); }

/* Model selector */
.model-bar {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
  padding: 0 4px;
}
.model-bar::-webkit-scrollbar { display: none; }

.model-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted2);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.18s;
  letter-spacing: 0.04em;
}

.model-btn:hover {
  border-color: var(--border2);
  color: var(--text);
}

.model-btn.active {
  background: rgba(0,229,255,0.1);
  border-color: rgba(0,229,255,0.4);
  color: var(--accent);
}

.model-btn.active.deepseek {
  background: rgba(191,90,242,0.1);
  border-color: rgba(191,90,242,0.4);
  color: var(--accent2);
}

.model-btn.active.glm {
  background: rgba(57,255,20,0.08);
  border-color: rgba(57,255,20,0.3);
  color: var(--green);
}

/* Status dot */
.status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 10px;
  color: var(--muted);
  flex-shrink: 0;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: statusPulse 3s ease-in-out infinite;
}

@keyframes statusPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ── MESSAGES ── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  position: relative;
  z-index: 1;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.msg {
  display: flex;
  gap: 10px;
  max-width: 780px;
  width: 100%;
  animation: msgIn 0.2s ease forwards;
  opacity: 0;
  transform: translateY(6px);
}

@keyframes msgIn { to { opacity: 1; transform: translateY(0); } }

.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot  { align-self: flex-start; }

.avatar {
  width: 26px; height: 26px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700;
  flex-shrink: 0; margin-top: 3px;
  letter-spacing: 0.05em;
}

.msg.user .avatar {
  background: rgba(0,229,255,0.12);
  color: var(--accent);
  border: 1px solid rgba(0,229,255,0.25);
}

.msg.bot .avatar {
  background: var(--card);
  color: var(--muted2);
  border: 1px solid var(--border);
}

.bubble {
  padding: 11px 15px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.7;
  max-width: calc(100% - 38px);
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
}

.msg.user .bubble {
  background: var(--user-bg);
  border: 1px solid rgba(0,229,255,0.12);
  color: var(--text);
  border-top-right-radius: 2px;
}

.msg.bot .bubble {
  background: var(--bot-bg);
  border: 1px solid var(--border);
  color: var(--text);
  border-top-left-radius: 2px;
}

.msg.error .bubble {
  background: rgba(255,69,58,0.06);
  border-color: rgba(255,69,58,0.25);
  color: #ff6b62;
}

/* Model tag on bot messages */
.model-tag {
  display: inline-block;
  font-size: 9px;
  color: var(--muted);
  margin-bottom: 5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Typing */
.typing .bubble {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 13px 15px;
}

.tdot {
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--muted2);
  animation: tdot 1.3s ease-in-out infinite;
}
.tdot:nth-child(2) { animation-delay: 0.18s; }
.tdot:nth-child(3) { animation-delay: 0.36s; }

@keyframes tdot {
  0%, 80%, 100% { opacity: 0.15; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.1); }
}

/* ── WELCOME ── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 10px;
  color: var(--muted);
  text-align: center;
  padding: 40px 20px;
}

.welcome-glyph {
  font-size: 36px;
  line-height: 1;
  margin-bottom: 8px;
  filter: grayscale(0.3);
}

.welcome h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.04em;
}

.welcome p { font-size: 11px; line-height: 1.7; max-width: 340px; }

.model-pills {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
  margin-top: 6px;
}

.pill {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted2);
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 10;
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  background: rgba(7,7,9,0.95);
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}

.input-wrap {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 780px;
  margin: 0 auto;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 8px 8px 8px 14px;
  transition: border-color 0.2s;
}

.input-wrap:focus-within {
  border-color: rgba(0,229,255,0.3);
}

textarea {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  resize: none;
  min-height: 22px;
  max-height: 160px;
  line-height: 1.6;
  outline: none;
  padding: 2px 0;
}

textarea::placeholder { color: var(--muted); }

#send {
  background: var(--accent);
  border: none;
  border-radius: 7px;
  width: 36px; height: 36px;
  flex-shrink: 0;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s;
  color: #070709;
}

#send:hover { filter: brightness(1.15); transform: scale(1.05); }
#send:active { transform: scale(0.97); }
#send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
#send svg { width: 15px; height: 15px; }

.footer-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 780px;
  margin: 8px auto 0;
}

.hint { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }

#clear-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  letter-spacing: 0.04em;
  padding: 2px 6px;
  border-radius: 3px;
  transition: color 0.15s;
}

#clear-btn:hover { color: var(--danger); }
</style>
</head>
<body>

<header>
  <div class="logo">NΞ<span>URAL</span></div>

  <div class="model-bar">
    <button class="model-btn active" data-model="claude-haiku-4-5-20251001" data-family="claude">haiku-4.5</button>
    <button class="model-btn" data-model="claude-opus-4-6" data-family="claude">opus-4.6</button>
    <button class="model-btn deepseek" data-model="deepseek-v4-flash" data-family="deepseek">ds-flash</button>
    <button class="model-btn deepseek" data-model="deepseek-v4-pro" data-family="deepseek">ds-pro</button>
    <button class="model-btn glm" data-model="glm-5.1" data-family="glm">glm-5.1</button>
  </div>

  <div class="status">
    <div class="status-dot"></div>
    <span id="status-label">READY</span>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="welcome-glyph">◈</div>
    <h2>NΞURAL Chat</h2>
    <p>Multi-model AI interface. Select a model above and start chatting.</p>
    <div class="model-pills">
      <span class="pill">claude-haiku-4.5</span>
      <span class="pill">claude-opus-4.6</span>
      <span class="pill">deepseek-flash</span>
      <span class="pill">deepseek-pro</span>
      <span class="pill">glm-5.1</span>
    </div>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="input" placeholder="Message..." rows="1"></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="footer-meta">
    <span class="hint">↵ send &nbsp;·&nbsp; ⇧↵ newline</span>
    <button id="clear-btn">✕ clear chat</button>
  </div>
</footer>

<script>
  let history = [];
  let currentModel = 'claude-haiku-4-5-20251001';
  let busy = false;

  const input    = document.getElementById('input');
  const msgs     = document.getElementById('messages');
  const sendBtn  = document.getElementById('send');
  const statusEl = document.getElementById('status-label');

  // Model buttons
  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentModel = btn.dataset.model;
    });
  });

  // Clear
  document.getElementById('clear-btn').addEventListener('click', () => {
    history = [];
    msgs.innerHTML = '';
    const w = document.createElement('div');
    w.className = 'welcome'; w.id = 'welcome';
    w.innerHTML = `<div class="welcome-glyph">◈</div><h2>NΞURAL Chat</h2><p>Chat cleared. Start a new conversation.</p>`;
    msgs.appendChild(w);
  });

  // Auto-resize
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  sendBtn.addEventListener('click', send);

  function addMsg(role, text, modelName, isError) {
    document.getElementById('welcome')?.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}${isError ? ' error' : ''}`;

    const av = document.createElement('div');
    av.className = 'avatar';
    av.textContent = role === 'user' ? 'YOU' : 'AI';

    const bub = document.createElement('div');
    bub.className = 'bubble';

    if (role === 'bot' && modelName) {
      const tag = document.createElement('div');
      tag.className = 'model-tag';
      tag.textContent = modelName;
      bub.appendChild(tag);
    }

    const txt = document.createElement('div');
    txt.textContent = text;
    bub.appendChild(txt);

    wrap.appendChild(av);
    wrap.appendChild(bub);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return txt;
  }

  function addTyping() {
    document.getElementById('welcome')?.remove();
    const wrap = document.createElement('div');
    wrap.className = 'msg bot typing'; wrap.id = 'typing';
    const av = document.createElement('div');
    av.className = 'avatar'; av.textContent = 'AI';
    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = '<div class="tdot"></div><div class="tdot"></div><div class="tdot"></div>';
    wrap.appendChild(av); wrap.appendChild(bub);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
  }

  async function send() {
    if (busy) return;
    const text = input.value.trim();
    if (!text) return;

    addMsg('user', text);
    history.push({ role: 'user', content: text });
    input.value = ''; input.style.height = 'auto';

    busy = true;
    sendBtn.disabled = true;
    statusEl.textContent = 'THINKING…';
    addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history, model: currentModel }),
      });

      const data = await res.json();
      document.getElementById('typing')?.remove();

      if (!res.ok || data.error) {
        addMsg('bot', '⚠ ' + (data.error || `HTTP ${res.status}`), null, true);
      } else {
        addMsg('bot', data.reply, currentModel);
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      document.getElementById('typing')?.remove();
      addMsg('bot', '⚠ Network error: ' + err.message, null, true);
    } finally {
      busy = false;
      sendBtn.disabled = false;
      statusEl.textContent = 'READY';
      input.focus();
    }
  }
</script>
</body>
</html>
